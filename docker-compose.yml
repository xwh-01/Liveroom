services:
  redis:
    image: redis:7
    container_name: liveroom-redis
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.0
    container_name: liveroom-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: liveroom
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/001_init_records.sql:/docker-entrypoint-initdb.d/001_init_records.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
